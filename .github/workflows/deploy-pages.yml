# Builds and deploys to GitHub Pages when gallery assets or site code change.
# Repo Settings → Pages → Source: "GitHub Actions".
#
# ReignOfTea/galleree — VITE_BASE: /galleree/ for github.io project URL, or / (unset) for gallery.reignoftea.com

name: Deploy GitHub Pages

on:
  push:
    branches: ['main', 'master']
    paths:
      - 'public/gallery/**'
      - 'public/site.json'
      - 'src/**'
      - 'vite/**'
      - 'vite.config.ts'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_BASE: ${{ vars.VITE_BASE }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
