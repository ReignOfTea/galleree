<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="theme-color"
      content="#ffffff"
      id="meta-theme-color"
    />
    <!-- Dark Reader: skip this site so built-in light/dark themes render as designed (see darkreader/darkreader#9181). -->
    <meta name="darkreader-lock" />
    <meta name="color-scheme" content="only light" id="meta-color-scheme" />
    <script>
      ;(function () {
        try {
          var k = 'galleree-theme'
          var s = localStorage.getItem(k)
          var t =
            s === 'light' || s === 'dark'
              ? s
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.setAttribute('data-theme', t)
          var m = document.getElementById('meta-theme-color')
          if (m) m.setAttribute('content', t === 'dark' ? '#141413' : '#ffffff')
          var cs = document.getElementById('meta-color-scheme')
          if (cs)
            cs.setAttribute('content', t === 'dark' ? 'only dark' : 'only light')
        } catch (e) {
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
          var cs2 = document.getElementById('meta-color-scheme')
          if (cs2)
            cs2.setAttribute('content', dark ? 'only dark' : 'only light')
        }
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Photography portfolio" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
